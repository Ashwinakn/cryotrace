version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cryotrace
      POSTGRES_USER: cryotrace
      POSTGRES_PASSWORD: cryotrace123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryotrace"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./src/backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://cryotrace:cryotrace123@postgres:5432/cryotrace
      REDIS_URL: redis://redis:6379
      SECRET_KEY: cryotrace-production-secret-key-change-me
      UPLOAD_DIR: /app/uploads
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./src/frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  spark-streaming:
    build: ./src/streaming
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CRYOTRACE_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build: ./src/streaming
    command: ["python", "simulator/lte_simulator.py", "--shipment-id", "demo-shipment-001", "--interval", "10"]
    environment:
      CRYOTRACE_API_URL: http://backend:8000
    depends_on:
      - backend
    profiles:
      - demo

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:3.5
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
